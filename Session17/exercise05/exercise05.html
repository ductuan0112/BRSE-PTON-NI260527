<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elegant Login Form</title>
  <link rel="stylesheet" href="./exercise05.css">
</head>

<body>
  <h1>ELEGANT LOGIN FORM</h1>
  <div class="form">
    <form action="#">
      <h2 class="log-in">LOG IN</h2>

      <div class="login">
        <div class="login-info">
          <input type="email" id="email" name="email" placeholder="Email" required>
        </div>
        <div class="login-info">
          <input type="password" id="password" name="password" placeholder="Password" required>
        </div>
        <button class="btn-submit" type="submit">Submit</button>

        <h2 class="text-or">OR</h2>
        <div class="login-method">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/Facebook-icon-1.png/960px-Facebook-icon-1.png"
            alt="fb-icon">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRZ_QDPRbFsnZyXt1weSoGwIidlcmM49F9tV-ljsKC-foTzYC29XEfLTQlq&s=10"
            alt="twitter-icon">
          <img src="https://cdn-icons-png.freepik.com/512/2190/2190371.png" alt="gg-icon">
        </div>
        <div class="account-check">
          <p>Not account yet? <a href="#">Signup</a></p>
          <a href="#">Forgot your password?</a>
        </div>
      </div>
    </form>
  </div>
  <footer>&copy; Elegant Login Form. All Rights Reserved | Design by W3layouts</footer>
  <script src="./exercise05.js"></script>
</body>

</html>
