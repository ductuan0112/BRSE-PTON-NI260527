<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change background color</title>
  <style>
    .flex {
      display: flex;
      gap: 10px;
    }

    .item {
      width: 100px;
      height: 100px;
      border: 2px solid black;
    }

    .yellow {
      background-color: yellow;
    }

    .green {
      background-color: green;
    }

    .pink {
      background-color: pink;
    }
  </style>
</head>

<body>
  <h1>Change background color</h1>
  <h4>Mouse over the square</h4>
  <div class="flex">
    <div class="item yellow" id="yellow"></div>
    <div class="item green" id="green"></div>
    <div class="item pink" id="pink"></div>
  </div>
  <script src="./exercise04.js"></script>
</body>

</html>
