<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal</title>
  <style>
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.2);
    }

    .modal {
      background-color: #fff;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px;
      border-radius: 4px;
      min-width: 300px;
    }

    .modal-body {
      position: relative;
    }

    .btn-close {
      position: absolute;
      top: -15px;
      right: -10px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Modal Example</h1>
  <button class="btn-open">Open Modal</button>

  <div class="overlay">
    <div class="modal">
      <div class="modal-body">
        Some text in the modal
        <span class="btn-close">x</span>
      </div>
    </div>
  </div>
  <script src="./exercise03.js"></script>
</body>

</html>
