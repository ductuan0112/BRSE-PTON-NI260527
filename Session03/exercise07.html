<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo form thông tin sở thích</title>
</head>

<body>
    <form action="">

        <h1>SỞ THÍCH CỦA BẠN</h1>
        <label for="name">Họ và tên</label>
        <input type="text" id="name" name="name"> <br>

        <label for="email">Email</label>
        <input type="email" id="email" name="email"> <br>

        <label>Sở thích</label><br>
        <input type="checkbox" name="hobby" value="sport" id="sport"> <label for="sport">Thể thao</label>
        <input type="checkbox" name="hobby" value="music" id="music"> <label for="music">Âm nhạc</label> 
        <input type="checkbox" name="hobby" value="book" id="book"> <label for="book">Đọc sách</label> <br>


        <input type="checkbox" name="hobby" value="web" id="web"> <label for="web">Lướt web</label>
        <input type="checkbox" name="hobby" value="game" id="game"> <label for="game">Chơi game</label>
        <input type="checkbox" name="hobby" value="film" id="film"> <label for="film">Điện ảnh</label> <br>


        <input type="checkbox" name="hobby" value="travel" id="travel"> <label for="travel">Du lịch</label> <br>
        <button type="submit">Gửi thông tin</button>
        <button type="reset">Nhập lại</button>

    </form>
</body>

</html>
