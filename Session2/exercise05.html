<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Store</title>
</head>
<body>
    <h2>My Store</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Item Photo</th>
                <th>Name</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><img width="200" height="150" src="https://media-cdn-v2.laodong.vn/uploaded/phamthuhien/2014_06_30/c%20(16)_qqrj.jpg" alt="Oranges"></td>
                <td>Oranges</td>
                <td>$1 ea.</td>
            </tr>
            <tr>
                <td><img width="200" height="150" src="notfound.jpg" alt="Bananas"></td>
                <td>Bananas</td>
                <td>$0.75/lb</td>
            </tr>
            <tr>
                <td><img width="200" height="150" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRCUsaqmQZ5Tjc2POG85WpI87C34VhPSVclPQ&s" alt="Pomegranates"></td>
                <td>Pomegranates</td>
                <td>3 for $5</td>
            </tr>
            <tr>
                <td><img width="200" height="150" src="notfound.jpg" alt="Gummy Bears"></td>
                <td>Gummy Bears</td>
                <td>$6 per bag</td>
            </tr>
            <tr>
                <td><img width="200" height="150" src="https://cdn.tienphong.vn/images/e109ac87b2ea5fd4b94bef19249a7a09af13509c6bff8785bf0d788d00ef7bdd653e0f16b994d1ca21aa1066cc145e6ecce0c87807ee781e103d9cc3042b4068/bong_cai_xanh_GPNG.gif" alt="Broccoli"></td>
                <td>Broccoli</td>
                <td>$3 a head</td>
            </tr>
        </tbody>
    </table>

    <form action="http://bookingform.com">
        <h1>Booking Form</h1>

        <label for="name">Name:</label>
        <input type="text" name="name" id="name"><br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email"><br>

        <label for="phone">Phone:</label>
        <input type="tel" name="phone" id="phone"><br>

        <label for="date">Date:</label>
        <input type="date" name="date" id="date"><br>

        <label for="time">Time:</label>
        <input type="time" name="time" id="time"><br>

        <label for="nog">Number of Guests:</label>
        <input type="number" name="nog" id="nog"><br>

        <button type="submit">Submit</button>

    </form>
    
    <form action="http://carpurchaseform.com">
        <h1>Car Purchase Form</h1>

        <label for="name">Name:</label>
        <input type="text" name="name" id="name"><br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email"><br>

        <label for="phone">Phone:</label>
        <input type="tel" name="phone" id="phone"><br>

        <label for="carmodel">Choose a Car:</label>
        <select name="model" id="carmodel">
            <option value="model1">Model 1</option>
            <option value="model2">Model 2</option>
            <option value="model3">Model 3</option>
        </select><br>

        <label for="carcolor">Choose a Color:</label>
        <select name="color" id="carcolor">
            <option value="red">Red</option>
            <option value="yellow">Yellow</option>
            <option value="blue">Blue</option>
        </select><br>

        <label for="quantity">Quantity:</label>
        <input type="number" name="quantity" id="quantity"><br>

        <label for="deliverydate">Delivery Date:</label>
        <input type="date" name="deliverydate" id="deliverydate"><br>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
