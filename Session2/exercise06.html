<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web bán hang</title>
</head>
<body>
    <h1>Trang web bán hàng</h1>

    <nav>
        <ul>
            <li><a href="http://homepage.com">Trang chủ</a></li>
            <li><a href="http://product.com">Sản phẩm</a></li>
            <li><a href="http://introduction.com">Giới thiệu</a></li>
            <li><a href="http://contact.com">Liên hệ</a></li>
        </ul>
    </nav>

    <h2>Thông tin sản phẩm</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Tên sản phẩm</th>
                <th>Mô tả</th>
                <th>Giá</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Sản phẩm 1</td>
                <td>Mô tả sản phẩm 1</td>
                <td>100.000đ</td>
                <td>10</td>
            </tr>
            <tr>
                <td>Sản phẩm 2</td>
                <td>Mô tả sản phẩm 2</td>
                <td>200.000đ</td>
                <td>5</td>
            </tr>
            <tr>
                <td>Sản phẩm 3</td>
                <td>Mô tả sản phẩm 3</td>
                <td>300.000đ</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>
    <form action="http://userinformation.com">

        <h2>Thông tin người dùng</h2>

        <label for="name">Họ và tên:</label>
        <input type="text" name="name" id="name"><br>
    
        <label for="email">Email:</label>
        <input type="email" name="email" id="email"><br>
    
        <label for="tel">Số điện thoại:</label>
        <input type="tel" name="tel" id="tel"><br>
    
        <label for="address">Địa chỉ:</label>
        <input type="text" name="address" id="address"><br>
        <button type="submit">Đặt hàng</button>
    </form>
    <footer>
        <p>&copy;2023 Trang web bán hàng</p>
    </footer>
    
</body>
</html>
